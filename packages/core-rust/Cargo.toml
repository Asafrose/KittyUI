[package]
name = "kittyui-core"
version = "0.1.0"
edition = "2021"
description = "Core Rust library for KittyUI terminal rendering"

[lib]
# Compile as a shared library (.so/.dylib/.dll) for use via bun:ffi with C ABI
crate-type = ["cdylib", "rlib"]

[dependencies]
base64 = "0.22"
cosmic-text = "0.12"
flate2 = "1.0"
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "gif", "webp"] }
libc = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
signal-hook = "0.3"
cosmic-text = "0.12"
taffy = "0.7"

[dev-dependencies]
serial_test = "3"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
unwrap_used = "deny"
expect_used = "deny"
