[package]
name = "kittyui-core"
version = "0.1.0"
edition = "2021"
description = "Core Rust library for KittyUI terminal rendering"

[lib]
# Compile as a shared library (.so/.dylib/.dll) for use via bun:ffi with C ABI
crate-type = ["cdylib"]

[dependencies]

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
unwrap_used = "deny"
expect_used = "deny"
