name: TypeScript CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint:ts

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/core-rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/core-rust/Cargo.lock') }}

      - name: Build native library
        run: cd packages/core && bun run build:native

      - name: Test
        run: bun test
